<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Mullet - Redirecting</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #fff;
      color: #1a1a2e;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    @media (prefers-color-scheme: dark) {
      body { background: #060717; color: #fff; }
      .spinner { border-color: rgba(238, 217, 76, 0.2); border-top-color: #eed94c; }
    }
    .container { text-align: center; }
    .spinner {
      width: 32px;
      height: 32px;
      border: 3px solid rgba(238, 217, 76, 0.25);
      border-top-color: #eed94c;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .text { font-size: 16px; opacity: 0.7; }
  </style>
</head>
<body>
  <div class="container">
    <div class="spinner"></div>
    <p class="text">正在跳转到 Mullet App...</p>
  </div>
  <script>
    ;(function () {
      var pathname = window.location.pathname
      var searchParams = new URLSearchParams(window.location.search)

      // 从 URL 参数获取 __scheme，默认 mullet（生产环境）
      var scheme = searchParams.get('__scheme') || 'mullet'
      // 移除 __scheme 参数，避免透传给 App
      searchParams.delete('__scheme')
      var remaining = searchParams.toString()
      var params = (remaining ? '?' + remaining : '') + window.location.hash

      var marker = '/app-redirect'
      var idx = pathname.indexOf(marker)

      if (idx !== -1) {
        // 取 /app-redirect 之后的路径，忽略前面的任何内容
        // /app-redirect/login?__scheme=mullet-dev → mullet-dev://login
        // /zh-tw/app-redirect/some/path?__scheme=mullet-test → mullet-test://some/path
        var appPath = pathname.substring(idx + marker.length) || '/'
        window.location.href = scheme + ':/' + appPath + params
      } else {
        window.location.href = scheme + '://' + params
      }
    })()
  </script>
</body>
</html>
